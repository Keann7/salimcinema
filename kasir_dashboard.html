<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Salim Cinema</title>
    <link rel="stylesheet" href="style_kasir.css">
</head>
<body>

    <div class="admin-header">
        <div class="logo">ADMIN<span class="red-text">PANEL</span></div>
        <div class="header-tools">
            <div class="counter-box">
                Sisa Kursi: <span id="seatCount">28</span>
            </div>
            <button class="undo-btn" onclick="undoLastAction()">UNDO</button>
            <button class="reset-btn" onclick="showModal()">RESET</button>
            <button onclick="showCheckoutModal()" class="undo-btn" style="background-color: #27ae60;">SELESAIKAN</button>
            <button onclick="window.location.href='rekap_penjualan.html'" class="reset-btn" style="background-color: #2980b9;">LIHAT REKAP</button>
            <button class="logout-btn" onclick="location.href='index.html'">LOGOUT</button>
        </div>

        <div id="checkoutModal" class="modal-overlay">
            <div class="modal-card">
                <h3>Input Nama Kelas</h3>
                <p>Masukkan penanda untuk pesanan ini:</p>
                <input type="text" id="classNameInput" placeholder="Misal: 12 IPA 1">
                <div class="modal-buttons">
                    <button onclick="closeCheckoutModal()" class="btn-cancel">BATAL</button>
                    <button onclick="finishPurchase()" class="btn-confirm">SIMPAN</button>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="legend">
            <div class="item">
                <img src="g.png" alt="Tersedia">
                <span>Tersedia</span>
            </div>
            <div class="item">
                <img src="r.png" alt="Terisi">
                <span>Terisi / Terpilih</span>
            </div>
        </div>

        <div class="cinema-layout">
            <div class="block-wrapper">
                <div class="seat-block" id="blockLeft"></div>
                <div class="gender-label label-pink">Perempuan</div>
            </div>
        
            <div class="aisle"></div>
        
            <div class="block-wrapper">
                <div class="seat-block" id="blockRight"></div>
                <div class="gender-label label-blue">Laki-laki</div>
            </div>
        </div>
    </div>

    <div class="screen-area">
        <div class="screen">LAYAR BIOSKOP</div>
    </div>

    <div id="resetModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-icon">!</div>
            <h2>Konfirmasi Reset</h2>
            <p>Apakah Anda yakin ingin mengosongkan kembali semua kursi? Tindakan ini tidak dapat dibatalkan.</p>
            <div class="modal-buttons">
                <button class="btn-confirm" onclick="resetSeats()">YA, RESET</button>
                <button class="btn-cancel" onclick="closeModal()">BATAL</button>
            </div>
        </div>
    </div>

    <audio id="clickSound" src="button.mp3" preload="auto"></audio>

    <script src="script_kasir.js"></script>

    <div id="toastContainer" class="toast-container"></div>
</body>
</html>
