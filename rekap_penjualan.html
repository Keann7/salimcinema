<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <title>Rekap Penjualan | Salim Cinema</title>
        <link rel="stylesheet" href="style_kasir.css">
        <style>
            .rekap-container { padding: 50px; max-width: 1000px; margin: 0 auto; }
            table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
            th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
            th { background-color: #e50914; color: white; }
            .btn-delete { background: #ff4d4d; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
            .btn-edit { background: #f39c12; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; margin-right: 5px; }
        </style>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
        <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    </head>
    <body>
        <div class="rekap-container">
            <h1>REKAP PENJUALAN TIKET</h1>
            <button onclick="window.location.href='kasir_dashboard.html'" class="reset-btn">KEMBALI KE KASIR</button>
            
            <table id="salesTable">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Nama Kelas</th>
                        <th>Jumlah Kursi</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="salesBody"></tbody>
            </table>
        </div>

        <script>
            var database;

            // 3. Konfigurasi
            const firebaseConfig = {
                databaseURL: "https://salim-cinema-default-rtdb.asia-southeast1.firebasedatabase.app/"
            };

            // 4. Inisialisasi Firebase (Dilakukan SEBELUM mendefinisikan fungsi yang memakainya)
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }

            // TENTUKAN NILAI VARIABEL DATABASE DI SINI
            database = firebase.database();

            // 5. Baru buat fungsi loadSales
            function loadSales() {
                const salesBody = document.getElementById('salesBody');
                
                // Sekarang variabel 'database' sudah memiliki nilai dan bisa dipakai
                database.ref('salesHistory').on('value', (snapshot) => {
                    const data = snapshot.val();
                    salesBody.innerHTML = ""; 
                    
                    if (data) {
                        Object.keys(data).forEach((key) => {
                            const sale = data[key];
                            const row = `
                                <tr>
                                    <td>${sale.tanggal}</td>
                                    <td>${sale.namaKelas}</td>
                                    <td>${sale.jumlahKursi}</td>
                                    <td>
                                        <button class="btn-edit" onclick="editSale('${key}')">EDIT</button>
                                        <button class="btn-delete" onclick="deleteSale('${key}')">HAPUS</button>
                                    </td>
                                </tr>
                            `;
                            salesBody.innerHTML += row;
                        });
                    } else {
                        salesBody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>Belum ada data penjualan di Cloud.</td></tr>";
                    }
                }, (error) => {
                    console.error("Gagal mengambil data:", error);
                });
            }

            // 6. Jalankan fungsi loadSales setelah seluruh HTML selesai dimuat
            window.onload = function() {
                loadSales();
            };

            // Fungsi Tambahan agar tidak error saat diklik
            function deleteSale(key) {
                if (confirm("Hapus data rekap ini?")) {
                    database.ref('salesHistory/' + key).remove();
                }
            }

            function editSale(key) {
                const newName = prompt("Masukkan nama kelas baru:");
                if (newName) {
                    database.ref('salesHistory/' + key).update({ namaKelas: newName });
                }
            }
        </script>

        <div id="toastContainer" class="toast-container"></div>
    </body>
</html>
