<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <title>Rekap Penjualan | Salim Cinema</title>
        <link rel="stylesheet" href="style_kasir.css">
        <style>
            .rekap-container { padding: 50px; max-width: 1000px; margin: 0 auto; }
            table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
            th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
            th { background-color: #e50914; color: white; }
            .btn-delete { background: #ff4d4d; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
            .btn-edit { background: #f39c12; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; margin-right: 5px; }
        </style>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
        <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    </head>
    <body>
        <div class="rekap-container">
            <h1>REKAP PENJUALAN TIKET</h1>
            <button onclick="window.location.href='kasir_dashboard.html'" class="reset-btn">KEMBALI KE KASIR</button>
            
            <table id="salesTable">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Nama Kelas</th>
                        <th>Jumlah Kursi</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="salesBody"></tbody>
            </table>
        </div>

        <script>
            // Fungsi Menghapus Data di Firebase
            function deleteSale(key) {
                Swal.fire({
                    title: 'Hapus Data?',
                    text: "Data ini akan terhapus dari cloud secara permanen!",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#e50914',
                    cancelButtonColor: '#999',
                    confirmButtonText: 'Ya, Hapus!',
                    cancelButtonText: 'Batal'
                }).then((result) => {
                    if (result.isConfirmed) {
                        // MENGHAPUS BERDASARKAN KEY FIREBASE
                        database.ref('salesHistory/' + key).remove()
                            .then(() => {
                                Swal.fire('Terhapus!', 'Data berhasil dihapus dari pusat.', 'success');
                            })
                            .catch((error) => {
                                Swal.fire('Error', 'Gagal menghapus data: ' + error.message, 'error');
                            });
                    }
                });
            }

            // Fungsi Mengedit Nama Kelas di Firebase
            function editSale(key) {
                // Ambil data lama dulu untuk ditampilkan di input pop-up
                database.ref('salesHistory/' + key).once('value').then((snapshot) => {
                    const currentData = snapshot.val();

                    Swal.fire({
                        title: 'Edit Nama Kelas',
                        input: 'text',
                        inputValue: currentData.namaKelas,
                        showCancelButton: true,
                        confirmButtonColor: '#27ae60',
                        confirmButtonText: 'Simpan Perubahan',
                        cancelButtonText: 'Batal'
                    }).then((result) => {
                        if (result.isConfirmed && result.value) {
                            // UPDATE HANYA NAMA KELAS DI FIREBASE
                            database.ref('salesHistory/' + key).update({
                                namaKelas: result.value
                            }).then(() => {
                                Swal.fire('Berhasil!', 'Data pusat telah diperbarui.', 'success');
                            });
                        }
                    });
                });
            }

            function loadSales() {
                const salesBody = document.getElementById('salesBody');
                
                database.ref('salesHistory').on('value', (snapshot) => {
                    const data = snapshot.val();
                    salesBody.innerHTML = ""; 
                    
                    if (data) {
                        Object.keys(data).forEach((key) => {
                            const sale = data[key];
                            const row = `
                                <tr>
                                    <td>${sale.tanggal}</td>
                                    <td>${sale.namaKelas}</td>
                                    <td>${sale.jumlahKursi}</td>
                                    <td>
                                        <button class="btn-edit" onclick="editSale('${key}')">EDIT</button>
                                        <button class="btn-delete" onclick="deleteSale('${key}')">HAPUS</button>
                                    </td>
                                </tr>
                            `;
                            salesBody.innerHTML += row;
                        });
                    } else {
                        salesBody.innerHTML = "<tr><td colspan='4'>Belum ada data penjualan.</td></tr>";
                    }
                });
            }
            window.onload = loadSales;
        </script>

        <div id="toastContainer" class="toast-container"></div>
    </body>
</html>
