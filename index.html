<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Login | Salim Cinema</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="split left">
            <div class="content">
                <div class="logo">
                    <span class="red-text">CINEMA</span><span>APP</span>
                </div>
                <h1>Customer</h1>
                <p>Pesan tiket film favoritmu dengan mudah.</p>
                
                <div class="login-box">
                    <div class="password-container">
                        <input type="password" id="customerPass" placeholder="Input password">
                        <svg class="eye-icon" id="eyeOpenCustomer" onclick="togglePass('customerPass', 'eyeOpenCustomer', 'eyeCloseCustomer')" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                        <svg class="eye-icon hidden" id="eyeCloseCustomer" onclick="togglePass('customerPass', 'eyeOpenCustomer', 'eyeCloseCustomer')" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M21.066 12A10.476 10.476 0 0 1 12.113 18.047M17.61 17.61L18.783 18.783M12 12a3 3 0 1 0-3-3M19.345 19.345c2.146-2.146 3.425-5.111 3.425-8.345 0-1.127-.16-2.222-.457-3.268M9.919 9.919L3 3" />
                        </svg>
                    </div>
                    <button onclick="login('customer')">MASUK</button>
                </div>
            </div>
        </div>

        <div class="split right">
            <div class="content">
                <div class="logo">
                    <span>ADMIN</span><span class="red-text">PANEL</span>
                </div>
                <h1>Kasir</h1>
                <p>Manajemen pemesanan dan cetak tiket fisik.</p>
                
                <div class="login-box">
                    <div class="password-container">
                        <input type="password" id="kasirPass" placeholder="Input password">
                        <svg class="eye-icon" id="eyeOpenKasir" onclick="togglePass('kasirPass', 'eyeOpenKasir', 'eyeCloseKasir')" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                        <svg class="eye-icon hidden" id="eyeCloseKasir" onclick="togglePass('kasirPass', 'eyeOpenKasir', 'eyeCloseKasir')" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M21.066 12A10.476 10.476 0 0 1 12.113 18.047M17.61 17.61L18.783 18.783M12 12a3 3 0 1 0-3-3M19.345 19.345c2.146-2.146 3.425-5.111 3.425-8.345 0-1.127-.16-2.222-.457-3.268M9.919 9.919L3 3" />
                        </svg>
                    </div>
                    <button onclick="login('kasir')">MASUK ADMIN</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
